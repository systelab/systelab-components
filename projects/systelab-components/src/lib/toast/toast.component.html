<div [ngClass]="toastClass"
     [@fadeAnimation]="{ value: animationState, params: { fadeIn: 1000, fadeOut: 1000 } }"
     (@fadeAnimation.done)="onFadeFinished($event)">
    <i class="type" [ngClass]="iconClass"></i>
    <div class="slab-toast__content">
        <div class="slab-toast__title">{{ title }}</div>
        @if (body) {
            <div class="slab-toast__body">{{ body }}</div>
        }
    </div>
    @if (hasAction) {
        <button class="slab-toast__action" (click)="onActionClick()" type="button">
            {{ data.action.label }}
        </button>
    }
    @if (config.showCloseButton) {
        <i class="close" (click)="closeToast()" role="button" tabindex="0"
           (keydown.enter)="closeToast()"
           (keydown.space)="closeToast()"></i>
    }
</div>
